name: API change review (Claude)

# Layer 3 — Claude reviews public-API changes via the official claude-code-action.
# Complements the deterministic griffe report (api-surface.yml): catches behavioral
# breaks under an UNCHANGED signature (a method that now raises, a property setter with
# new side effects, a changed default) and names affected downstream consumers.
# Advisory — posts one PR comment, never fails the build.
#
# Requires repo secret ANTHROPIC_API_KEY. Without it the review step is skipped (job
# stays green), so forks and secret-less runs are unaffected.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so griffe/diff can reach the base ref
      - uses: actions/setup-python@v4
        with:
          python-version: 3.11.5
      - name: Install griffe
        run: pip install griffe
      - uses: anthropics/claude-code-action@v1
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}  # use the built-in token (no Claude GitHub App needed)
          prompt: |
            Review this PR for changes to the PUBLIC API surface of the Python package
            `genlm.control`. You are on the runner with the checked-out repo.

            1. `git fetch origin ${{ github.base_ref }}`, then run the deterministic
               signature check and read its output:
               `python -m griffe check genlm.control -s . -a origin/${{ github.base_ref }}`
            2. Read the PR's diff under `genlm/control/`
               (`gh pr diff ${{ github.event.pull_request.number }}`); ignore tests,
               comments, and docstrings.
            3. Classify each PUBLIC change (importable names, not `_`-prefixed):
               - breaking: old callers break — removed/renamed symbol, removed or reordered
                 required param, a method that now raises where it used to work.
               - behavioral: SAME signature, DIFFERENT behavior/contract — new exception path,
                 changed default semantics, changed return shape, a property setter with new
                 side effects. griffe cannot see these; they are the highest-value findings.
               - safe: additive — new optional param with a default, new method/attribute.
               Name the likely-affected downstream consumers: genlm-latent, smc_learning.
               Omit a consumer if not plausibly affected.
            4. If there are NO public-API changes, do not post anything — finish without
               commenting. Otherwise post ONE top-level PR comment via `gh pr comment`: a short
               markdown table (severity | symbol | change | affected), led by a one-line count
               (N breaking / N behavioral / N safe). No footer or disclaimer. Only post the
               GitHub comment — do not submit review text as chat messages.
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Bash(git fetch:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(python -m griffe:*)"
